[init]
timeout_secs = 5

[control]
kinematics_horizon = 500
hz = 100
estop_dist_m = 0.30
# [lat_err, later_rate, heading_err, yaw_rate]
lqr = [0.80, 0.30, 1.20, 0.40]

[control.speed]
v_max = 2.0
v_min = 0.35
# greater = less speed as lateral target error grows
k_lateral = 4.0
# greater = less speed as heading target error grows
k_heading = 5.0
obstacle_slowdown_m = 2.5
# lateral acceleration cap used by curvature speed limiting
a_lat_max_ms2 = 3.0
accel_limit_ms2 = 1.5
decel_limit_ms2 = 5.0

[control.pid]
kp = 2.5           # proportional factor
ki = 0.20          # integral factor
kd = 0.05          # derivative factor
windup_limit = 0.5
max_throttle = 1.0 # WARN: put pid to 0.2 on live tests

[control.stanley]
k_cross_track = 2.5
softening_speed_ms = 0.8
max_steering_rad = 0.66

[control.perception]
mode = "apex"

[control.perception.ransac]
inlier_dist_m = 0.12
min_inliers = 13
iterations = 80
max_walls = 4
min_pair_sep_m = 0.1

[control.perception.apex]
median_window = 13
min_points = 8
min_forward_m = 0.12
min_range_jump_m = 0.13
max_opposite_dist_error_m = 0.28
prefer_nearer_opposite = false
wall_clearance_m = 0.63
apex_switch_threshold_rad = 0.06
apex_switch_hysteresis_factor = 5.0
max_lookahead_m = 2.2
min_lookahead_m = 1.4
lookahead_sensitivity = 4.9
side_lookahead_fov_deg = 80.0
side_lookahead_center_deg = 93.0
apex_lookahead_weight = 0.9

[live]
lidar_port = "/dev/lidar"

[sim]
length_m = 0.31
width_m = 0.17

[sim.kinematic]
wheelbase_m = 0.21
motor_gain_ms2 = 8.0
drag_k = 0.5
accel_max_ms2 = 15.0

[sim.dynamic]
wheelbase_m = 0.21
lf_m = 0.105
lr_m = 0.105
track_width_m = 0.145
mass_kg = 1.520
iz_kg_m2 = 0.01465
cf_n_per_rad = 12.0
cr_n_per_rad = 10.0
motor_gain_ms2 = 20
drag_k = 0.5
accel_max_ms2 = 20.0

[sim.dynamic.servo]
tau_s = 0.05
rate_limit_rad_s = 5.5
backlash_rad = 0.01

[sim.dynamic.motor]
tau_s = 0.03
deadband = 0.05
brake_gain = 1.4

[sim.dynamic.drivetrain]
front_drive_fraction = 0.5
traction_circle = true

[sim.dynamic.low_speed]
blend_start_ms = 0.05
blend_end_ms = 0.35
yaw_rate_margin = 1.6
lateral_damping = 10.0

[sim.dynamic.tyre]
mu = 1.2
pacejka_shape = 1.3
saturating = true

[sim.dynamic.chassis]
cg_height_m = 0.06

[sim.latency]
latency_us = 0

[start_gate]
udp_bind = "0.0.0.0"
udp_port = 4578
udp_token = "nfe"
gpio_enabled = false
# gpio_pin = 17
sim_start_delay_ms = 100
replay_start_delay_ms = 0

[safety]
# wheelbase (m)
wheelbase_m = 0.215
# half-width of the collision channel (m)
half_channel_w_m = 0.13
# lookahead time (s)
t_lookahead_s = 0.4
# estop length limits (m)
estop_min_m = 0.05
estop_max_m = 0.2
# arc curvature constant — controls parabola validity
c_arc = 0.5
# tan delta lower bound to avoid divide-by-zero
tan_min = 0.0717
# re-arm (clear) gap in metres
rearm_gap_m = 0.20
# number of consecutive clean ticks required to clear estop
n_clean_ticks = 5
# blind/backstop parameters (ms)
min_front_points = 4
lidar_stale_ms = 350
blind_grace_ms = 350
# IMU / Sonar staleness (ms)
imu_stale_ms = 20
sonar_stale_ms = 100
# leaky-bucket escalate threshold
escalate_at = 6
