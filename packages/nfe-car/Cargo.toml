[package]
name = "nfe-car"
version = "0.1.1"
edition = "2021"
description = "NFE — CARTEN M210 autonomous car control loop (PREEMPT_RT / Tokio)"

# ── Binaries ──────────────────────────────────────────────────────────────

[[bin]]
name = "car"
path = "src/main.rs"

[[bin]]
name = "car-diag"
path = "src/bin/diag.rs"

[[bin]]
name = "car-tune"
path = "src/bin/tune.rs"

[[bin]]
name = "nfe-arm"
path = "src/bin/arm.rs"

[[bin]]
name = "car-raceline"
path = "src/bin/raceline.rs"

[[bin]]
name = "car-bench"
path = "src/bin/bench.rs"


# ── Dependencies ──────────────────────────────────────────────────────────

[features]
default = []

[dependencies]
cmaes = "0.2.2"
tokio = { version = "1", features = ["rt", "time", "sync", "macros", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serialport = "4.9.0"
arc-swap = "1.9.1"
parking_lot = "0.12.5"
anyhow = "1.0.102"
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.150"
signal-hook-registry = "1.4.8"
toml = "0.8.19"
nfe-core = { path = "../nfe-core" }
nfe-algo = { path = "../nfe-algo" }
nfe-runtime = { path = "../nfe-runtime" }
nfe-sim = { path = "../nfe-sim" }
nfe-tuner = { path = "../nfe-tuner" }

[target.'cfg(target_os = "linux")'.dependencies]
rppal = "0.22.1"
libsystemd = "0.7"
libc = "0.2"
tracing-journald = "0.3"

[dev-dependencies]
mcap = "0.25.0"
