[package]
name = "nfe-sim"
version = "0.1.0"
edition = "2021"
description = "NFE deterministic simulator: world, physics, sensor synthesis"

[dependencies]
nfe-core = { path = "../nfe-core" }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rstar = "0.13.0"
tracing = "0.1"
