syntax = "proto3";
package foxglove;

message PackedElementField {
  string name = 1;
  fixed32 offset = 2;
  uint32 type = 3; // 7 = FLOAT32
}

message PointCloud {
  uint64 timestamp = 1; // Unused by Foxglove, but good for your own reference
  string frame_id = 2;  // Usually "lidar" or "base_link"
  fixed32 point_stride = 3; // How many bytes per point
  repeated PackedElementField fields = 4;
  bytes data = 5; // The raw memory dump
}

syntax = "proto3";
package car_software;

message ImuSample {
  uint64 timestamp_us = 1;
  float ax = 2; float ay = 3; float az = 4;
  float gx = 5; float gy = 6; float gz = 7;
}

message SonarFrame {
  uint64 timestamp_us = 1;
  float front_m = 2; float left_m = 3; float right_m = 4;
}

message TickMetrics {
  uint64 tick = 1; uint64 timestamp_us = 2; uint64 loop_us = 3;
  float lateral_error_m = 4; float heading_error_rad = 5;
  float steering_rad = 6; float throttle = 7;
  float target_speed_ms = 8; float current_speed_ms = 9;
  float nearest_obstacle_m = 10; float gz_rad_s = 11; float vy_ms = 12;
  bool estop = 13; bool watchdog_miss = 14;
}

message ControlFrame {
  uint64 timestamp_us = 1;
  float steering_rad = 2; float throttle = 3;
  float target_speed = 4; float current_speed = 5;
}
