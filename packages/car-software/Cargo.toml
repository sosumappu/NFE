[package]
name = "car"
version = "0.1.1"
edition = "2021"
description = "NFE — CARTEN M210 autonomous car control loop (PREEMPT_RT / Tokio)"

# ── Binaries ──────────────────────────────────────────────────────────────

[[bin]]
name = "car"
path = "src/main.rs"

[[bin]]
name = "car-diag"
path = "src/bin/diag.rs"

[[bin]]
name = "car-tune"
path = "src/bin/tune.rs"


# ── Dependencies ──────────────────────────────────────────────────────────

[features]
default = []
prometheus = []

[dependencies]
mcap = "0.25.0"
cmaes = "0.2.2"
tokio = { version = "1", features = ["rt", "time", "sync", "macros", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serialport = "4.9.0"
arc-swap = "1.9.1"
parking_lot = "0.12.5"
anyhow = "1.0.102"
bincode = "1"
smallvec = { version = "1", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1.0.150"
serde-big-array = "0.5.1"
toml = "0.8.19"

# foxglove
prost = "0.14.4"
prost-types = "0.14.4"
foxglove-ws = "0.2.2"
memmap2 = "0.9.10"

[target.'cfg(target_os = "linux")'.dependencies]
rppal = "0.22.1"
libsystemd = "0.7"
libc = "0.2"
tracing-journald = "0.3"

[build-dependencies]
prost-build = "0.14.4"

# ── Profiles ──────────────────────────────────────────────────────────────

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1
