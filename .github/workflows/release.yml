name: Release image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-image:
    name: Build NixOS image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Configure Cachix pushes
        uses: cachix/cachix-action@v16
        with:
          name: neverfastenough
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Calculate source cache key
        id: cache-key
        run: |
          key="$(sha256sum flake.lock flake.nix Cargo.lock modules/preempt-rt.nix hosts/nfe/configuration.nix | sha256sum | cut -d ' ' -f 1)"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "### Nix source cache key" >> "$GITHUB_STEP_SUMMARY"
          echo "\`$key\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build car package
        run: nix build --print-build-logs --out-link result-nfe-car .#packages.aarch64-linux.nfe-car

      - name: Build NixOS toplevel
        run: nix build --print-build-logs --out-link result-toplevel .#nixosConfigurations.nfe.config.system.build.toplevel

      - name: Build SD-card image
        id: sd-card
        run: |
          nix build --print-build-logs --out-link result-sd-card .#nixosConfigurations.nfe.config.system.build.images.sd-card
          echo "path=$(readlink -f result-sd-card)" >> "$GITHUB_OUTPUT"

      - name: Upload SD-card image artifact
        uses: actions/upload-artifact@v4
        with:
          name: nfe-sd-card-${{ steps.cache-key.outputs.key }}
          path: ${{ steps.sd-card.outputs.path }}
          if-no-files-found: error
