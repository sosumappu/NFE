name: Cache deploy closure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-closure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-closure:
    name: Build deploy-rs closure
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Configure Cachix pushes
        uses: cachix/cachix-action@v16
        with:
          name: neverfastenough
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Calculate source cache key
        id: cache-key
        run: |
          key="$(sha256sum flake.lock flake.nix Cargo.lock modules/preempt-rt.nix hosts/nfe/configuration.nix | sha256sum | cut -d ' ' -f 1)"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          {
            echo "### Deploy closure cache key"
            echo "\`$key\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build car package
        run: nix build --print-build-logs --out-link result-nfe-car .#packages.aarch64-linux.nfe-car

      - name: Build NixOS toplevel
        run: nix build --print-build-logs --out-link result-toplevel .#nixosConfigurations.nfe.config.system.build.toplevel

      - name: Build deploy-rs activation path
        run: nix build --print-build-logs --out-link result-deploy .#deploy.nodes.nfe.profiles.system.path

      - name: Summarize deploy command
        run: |
          {
            echo "### Cached deploy closure"
            echo "After this run succeeds, deploy the cached generation with:"
            echo "\`deploy .#nfe\`"
          } >> "$GITHUB_STEP_SUMMARY"
